<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>📚 Sistema de Cursos</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
</head>
<body class="login-page">

<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">📚</div>
            <h1 class="login-title">Sistema de gestion de cursos</h1>
            <p class="login-subtitle">Sistema de Gestión curso</p>
        </div>

        <!-- Mensajes de error / logout -->
        <div th:if="${param.error}" class="alert alert-error">
            ❌ Usuario o contraseña incorrectos. Intente nuevamente.
        </div>
        <div th:if="${param.logout}" class="alert alert-success">
            ✅ Sesión cerrada correctamente.
        </div>

        <form th:action="@{/login}" method="post" class="login-form">
            <div class="form-group">
                <label for="username" class="form-label">👤 Usuario</label>
                <input type="text"
                       id="username"
                       name="username"
                       class="form-input"
                       placeholder="Ingresá tu usuario"
                       required
                       autofocus/>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">🔒 Contraseña</label>
                <input type="password"
                       id="password"
                       name="password"
                       class="form-input"
                       placeholder="Ingresá tu contraseña"
                       required/>
            </div>

            <button type="submit" class="btn btn-primary btn-full">
                Ingresar →
            </button>
        </form>

        <div class="login-hints">
            <p class="hint-title">Usuarios de prueba:</p>
            <div class="hint-item">
                <span class="badge badge-admin">ADMIN</span>
                <code>admin</code> / <code>1234</code>
            </div>
            <div class="hint-item">
                <span class="badge badge-empleado">USER</span>
                <code>user</code> / <code>1234</code>
            </div>
        </div>
    </div>
</div>

</body>
</html>
